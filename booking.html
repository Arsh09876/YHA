<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Form</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f5f9;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-top: -20px;
font-size: 40px;
color:blue;
font-weight: 900;
font-family: 'Roboto Slab', serif;

}

label{
font-weight:bolder;
display:block;
margin-top:10px;
font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif

}

input, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:5px;
font-weight: bold;
font-family: 'Times New Roman', Times, serif;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
margin-top:25px;
padding:12px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#072c6b;
}

/* Tablet Responsive */
@media (max-width:768px){

.container{
width:90%;
margin:20px auto;
padding:20px;
}

h2{
font-size:22px;

}

button{
font-size:15px;
}

}

/* Mobile Responsive */
@media (max-width:480px){

.container{
width:95%;
padding:5px;
margin-top: 85px;
}

h2{
font-size:25px;
font-weight: 800;
margin: 5px;
}

label{
font-size:14px;
}

input,select{
font-size: 14px;
padding:9px;
width: 94%;
}

button{
font-size:14px;
padding:11px;
}


}

</style>
</head>

<body>

<div class="container">

<h2>Booking Form</h2>

<form id="bookingForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Number of Persons</label>
<input type="number" id="persons" required>

<label>Check-In Date</label>
<input type="date" id="checkin" required>

<label>Check-Out Date</label>
<input type="date" id="checkout" required>

<label>Category</label>
<select id="category" required>
<option value="">Select Category</option>
<option>Delux Room</option>
<option>Conference Hall</option>
<option>AC Room</option>
<option>Non AC Room</option>
<option>Dormitory</option>
<option>Mini Lounge (Lobby)</option>
</select>


<label>Payment Mode</label>
<select id="payment">
<option>Online Only</option>
</select>

<button type="submit">Submit Booking</button>

</form>

</div>

<script>

document.getElementById("bookingForm").addEventListener("submit", function(e){

e.preventDefault();

var name=document.getElementById("name").value;
var persons=document.getElementById("persons").value;
var checkin=document.getElementById("checkin").value;
var checkout=document.getElementById("checkout").value;
var category=document.getElementById("category").value;
var payment=document.getElementById("payment").value;

var message =
"New Booking Request%0A%0A"+
"Name: "+name+"%0A"+
"No. of Persons: "+persons+"%0A"+
"Check-In Date: "+checkin+"%0A"+
"Check-Out Date: "+checkout+"%0A"+
"Category: "+category+"%0A"+
"Payment Mode: "+payment;

var phone="918171284536";

var url="https://wa.me/"+phone+"?text="+message;

window.open(url,"_blank");

});

</script>

</body>
</html>
